# 1. 强制 HTTP 跳 HTTPS
server {
    listen 80;
    server_name lens.red-magic.cn;
    return 301 https://$host$request_uri;
}

# 2. HTTPS 核心服务
server {
    listen 443 ssl;
    server_name lens.red-magic.cn;

    # 复用通配符证书（如实际路径不同，请按服务器证书路径调整）
    ssl_certificate     /etc/nginx/ssl/red-magic.cn/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/red-magic.cn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 200M;

    # =============== 前端静态文件 ===============
    root /home/red/work/kol_lens/frontend/dist/public;
    index index.html;

    # 前端 SPA 路由
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # =============== 后端 API 反向代理 ===============
    location /api/ {
        proxy_pass http://127.0.0.1:3007;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 60s;
    }
}

version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: sigma_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sigma_match}
      POSTGRES_USER: ${POSTGRES_USER:-sigma}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sigma_secret_2026}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/migrations/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sigma} -d ${POSTGRES_DB:-sigma_match}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sigma_net

  redis:
    image: redis:7-alpine
    container_name: sigma_redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --save 900 1
      --save 300 10
      --save 60 10000
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:-sigma_redis_2026}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-sigma_redis_2026}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sigma_net

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  sigma_net:
    driver: bridge
